layout: default

<style type="text/css" media="screen">
  .container {
    margin: 60px auto;
    max-width: 600px;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
  }
  .error-code {
    font-size: 6em;
    color: #00ff66;
    margin: 0;
    line-height: 1;
    text-shadow: 0 0 20px rgba(0, 255, 102, 0.3);
  }
  .error-message {
    color: #888;
    font-size: 1.2em;
    border-right: 2px solid #00ff66;
    display: inline;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink {
    50% { border-color: transparent; }
  }
  .error-prompt {
    color: #666;
    margin-top: 40px;
    font-size: 0.9em;
  }
  .error-prompt a {
    color: #00ff66;
    text-decoration: none;
  }
  .error-prompt a:hover {
    text-shadow: 0 0 8px rgba(0, 255, 102, 0.5);
  }
</style>

<div class="container">
  <p class="error-code">404</p>
  <p class="error-message">File not found</p>
  <p class="error-prompt">
    $ <a href="/">cd ~ &amp;&amp; ls</a>
  </p>
</div>
