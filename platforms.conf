# platforms.conf - Configuración de plataformas para write-ups
# Formato: PLATFORM_<SLUG_MAYUS>_<CAMPO>
# Para agregar una nueva plataforma:
#   1. Agrega el slug a PLATFORMS
#   2. Agrega las 5 variables PLATFORM_<SLUG>_*
#   3. Creá el template correspondiente en templates/

PLATFORMS="htb vh hl"

# ── Hack The Box ──────────────────────────────────────────────
PLATFORM_HTB_NAME="Hack The Box"
PLATFORM_HTB_ICON="/assets/images/hackthebox.svg"
PLATFORM_HTB_CATEGORY="hackthebox"
PLATFORM_HTB_TEMPLATE="htb.md"
PLATFORM_HTB_IMAGE_PREFIX="htb-writeup"

# ── VulnHub ───────────────────────────────────────────────────
PLATFORM_VH_NAME="VulnHub"
PLATFORM_VH_ICON="/assets/images/vulnhub.svg"
PLATFORM_VH_CATEGORY="vulnhub"
PLATFORM_VH_TEMPLATE="vh.md"
PLATFORM_VH_IMAGE_PREFIX="vulnhub-writeup"

# ── Home Lab ──────────────────────────────────────────────────
PLATFORM_HL_NAME="Home Lab"
PLATFORM_HL_ICON="/assets/images/homelab.svg"
PLATFORM_HL_CATEGORY="homelab"
PLATFORM_HL_TEMPLATE="hl.md"
PLATFORM_HL_IMAGE_PREFIX="homelab-writeup"
